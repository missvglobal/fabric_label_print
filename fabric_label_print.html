<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fabric Lump Label</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: lato; background: #f5f5f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 24px 16px; }
  .screen-ui { width: 100%; max-width: 480px; margin-bottom: 24px; }
  .screen-ui h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #333; margin-bottom: 2px; }
  .screen-ui p { font-size: 11px; color: #888; margin-bottom: 16px; letter-spacing: 0.04em; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .fields input { font-family: lato; font-size: 12px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 4px; background: white; color: #222; width: 100%; outline: none; }
  .fields input:focus { border-color: #999; }
  .fields input.full { grid-column: 1 / -1; }
  .btn-row { display: flex; gap: 8px; }
  .btn { font-family: lato; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 18px; border-radius: 4px; border: 1.5px solid #333; background: white; color: #333; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .btn:hover { background: #333; color: white; }
  .btn.primary { background: #333; color: white; }
  .btn.primary:hover { background: #000; border-color: #000; }
  .status { font-size: 11px; color: #888; margin-top: 10px; letter-spacing: 0.04em; min-height: 16px; }
  .status.ok { color: #3a7d1e; }
  .status.err { color: #c0392b; }
  .qr-note { margin-top: 12px; padding: 8px 12px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 4px; font-size: 11px; color: #5d4037; line-height: 1.6; }
  .qr-note strong { color: #333; }
  .label-container { display: flex; justify-content: center; }
  .label { width: 288px; min-height: 144px; height: auto; background: white; border: 1px solid #bbb; border-radius: 4px; display: flex; flex-direction: row; align-items: center; padding: 8px 10px; gap: 10px; overflow: hidden; }
  .qr-block { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
  #qrImg { display: block; width: 100px; height: 100px; }
  .qr-lump-id { font-family: lato; font-size: 9px; font-weight: 700; color: #333; letter-spacing: 0.08em; text-align: center; }
  .info-block { flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 2px; min-width: 0; overflow: hidden;margin-top:14px }
  .l-lump { font-family: lato; font-size: 15px; font-weight: 700; color: #000; letter-spacing: 0.06em; white-space: normal; word-break: break-word; }
  .l-item { font-family: lato; font-size: 9px; color: #555; letter-spacing: 0.03em; white-space: normal; word-break: break-word; }
  .l-name { font-family: lato; font-size: 16px; color: #222; line-height: 1.35; word-break: break-word; overflow-wrap: break-word; white-space: normal; }
  .l-bottom { display: flex; align-items: center; gap: 6px; margin-top: 2px; border-top: 0.5px solid #ddd; padding-top: 2px; }
  .l-meters { font-family: lato; font-size: 14px; font-weight: 700; color: #111; }
  .l-rack { font-family: lato; font-size: 9px; background: #222; color: #fff; padding: 1px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 0.05em;display:none }
  .l-date { font-family: lato; font-size: 12px; color: #000; margin-left: auto; }
  div#l_item_code {display: none}

  @media print {
    body { background: white; padding: 0; display: block; }
    .screen-ui { display: none !important; }
    .label-container { display: block; }
    .label { width: 76mm; height: 38mm; border: none; border-radius: 0; padding: 1.5mm 2.5mm; gap: 2mm; page-break-inside: avoid; }
    #qrImg      { width: 30mm; height: 30mm; }
    .qr-lump-id { font-size: 6pt; }
    .l-lump     { font-size: 9.5pt; }
    .l-item     { font-size: 7pt; }
    .l-name     { font-size: 7pt; word-break: break-word; overflow-wrap: break-word; white-space: normal; }
    .l-meters   { font-size: 9pt; }
    .l-rack     { font-size: 7pt; }
    .l-date     { font-size: 7pt; }
    @page { size: 76mm 38mm; margin: 0; }
  }
</style>
</head>
<body>

<div class="screen-ui">
  <h1>Fabric Lump Label</h1>
  <p>TTP-244 PRO · 76 × 38 mm · Fill fields or open via AppSheet URL</p>
  <div class="fields">
    <input id="f_lump_id"   placeholder="Lump ID  e.g. C01-L003" />
    <input id="f_item_code" placeholder="Item Code  e.g. C01" />
    <input id="f_meters"    placeholder="Meters  e.g. 72.5" />
    <input id="f_rack"      placeholder="Rack  e.g. Rack-A03" />
    <input id="f_name"      class="full" placeholder="Full encode  e.g. C01_Santoon_Polyster_Brown_42_Meter_Dyed" />
    <input id="f_color"     placeholder="Color  e.g. Chocolate" />
    <input id="f_type"      placeholder="Dye  e.g. Dyed" />
  </div>
  <div class="btn-row">
    <button class="btn" onclick="buildLabel()">Preview</button>
    <button class="btn primary" onclick="window.print()">Print label</button>
  </div>
  <div class="status" id="status"></div>
  <div class="qr-note">
    <strong>QR encodes: full encode string</strong><br>
    When doer scans this QR in AppSheet → all existing actions work unchanged.
  </div>
</div>

<div class="label-container">
  <div class="label" id="label">
    <div class="qr-block">
      <div class="l-lump" id="l_lump_id" style="font-size: 20px;font-weight:700;font-family:lato;top:40x;margin-bottom:8px;"></div>
      <img id="qrImg" src="" alt="QR" />
      <div class="qr-lump-id" id="qr_lump_label" style="display:none"></div>
    </div>
    <div class="info-block">
      <div class="l-item" id="l_item_code"></div>
      <div class="l-name" id="l_name"></div>
      <div class="l-bottom">
        <div class="l-meters" id="l_meters"></div>
        <div class="l-rack"   id="l_rack"></div>
        <div class="l-date"   id="l_date"></div>
      </div>
    </div>
  </div>
</div>

<script>
  function getParam(key, fallback) {
    const p = new URLSearchParams(window.location.search);
    return p.get(key) || fallback || '';
  }

  function buildLabel() {
    const lumpId   = document.getElementById('f_lump_id').value.trim();
    const itemCode = document.getElementById('f_item_code').value.trim();
    const meters   = document.getElementById('f_meters').value.trim();
    const rack     = document.getElementById('f_rack').value.trim();
    const name     = document.getElementById('f_name').value.trim();

    if (!lumpId) { setStatus('Enter a lump ID first.', 'err'); return; }

    const qrData = name || lumpId;
    const qrUrl  = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='
      + encodeURIComponent(qrData) + '&bgcolor=ffffff&color=000000&margin=2';

    const today = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' });

    document.getElementById('qrImg').src                = qrUrl;
    document.getElementById('qr_lump_label').textContent = lumpId;
    document.getElementById('l_lump_id').textContent    = lumpId;
    document.getElementById('l_item_code').textContent  = itemCode ? 'Item: ' + itemCode : '';
    document.getElementById('l_name').textContent       = name;
    document.getElementById('l_meters').textContent     = meters ? meters + ' m' : '';
    document.getElementById('l_rack').textContent       = rack || '';
    document.getElementById('l_date').textContent       = today;

    setStatus('Label ready — tap Print label.', 'ok');
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = 'status ' + (cls || '');
  }

  function loadFromUrl() {
    const lumpId = getParam('lump_id');
    if (lumpId) {
      document.getElementById('f_lump_id').value   = lumpId;
      document.getElementById('f_item_code').value = getParam('item_code');
      document.getElementById('f_meters').value    = getParam('meters');
      document.getElementById('f_rack').value      = getParam('rack');
      document.getElementById('f_name').value      = getParam('name');
      document.getElementById('f_color').value     = getParam('color');
      document.getElementById('f_type').value      = getParam('type');
      buildLabel();

      if (getParam('autoprint') === '1') {
        const qrImage = document.getElementById('qrImg');
        const doPrint = () => { setTimeout(() => { window.focus(); window.print(); }, 1000); };
        if (qrImage.complete) { doPrint(); }
        else { qrImage.onload = doPrint; qrImage.onerror = doPrint; setTimeout(doPrint, 3000); }
      }
    } else {
      document.getElementById('f_lump_id').value   = 'C01-L003';
      document.getElementById('f_item_code').value = 'C01';
      document.getElementById('f_meters').value    = '72.5';
      document.getElementById('f_rack').value      = 'Rack-A03';
      document.getElementById('f_name').value      = 'C01_Santoon_Polyster_Brown_Chocolate_42_Meter_Dyed';
      buildLabel();
      setStatus('Example label — fill your values above.', '');
    }
  }

  loadFromUrl();
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') buildLabel(); });
  });
</script>
</body>
</html>
