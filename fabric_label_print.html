<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fabric Label Print</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
  }

  /* ── screen-only UI ── */
  .screen-ui {
    width: 100%;
    max-width: 480px;
    margin-bottom: 24px;
  }

  .screen-ui h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 2px;
  }

  .screen-ui p {
    font-size: 11px;
    color: #888;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .fields input {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: white;
    color: #222;
    width: 100%;
    outline: none;
  }

  .fields input:focus { border-color: #999; }
  .fields input.full  { grid-column: 1 / -1; }

  .btn-row { display: flex; gap: 8px; }

  .btn {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    border: 1.5px solid #333;
    background: white;
    color: #333;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn:hover { background: #333; color: white; }

  .btn.primary {
    background: #333;
    color: white;
  }

  .btn.primary:hover { background: #000; border-color: #000; }

  .status {
    font-size: 11px;
    color: #888;
    margin-top: 10px;
    letter-spacing: 0.04em;
    min-height: 16px;
  }

  .status.ok  { color: #3a7d1e; }
  .status.err { color: #c0392b; }

  /* ── label ── */
  .label-container {
    display: flex;
    justify-content: center;
  }

  /* 76mm × 38mm at 96dpi ≈ 288 × 144px */
  .label {
    width: 288px;
    height: 144px;
    background: white;
    border: 1px solid #bbb;
    border-radius: 4px;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 8px 10px;
    gap: 10px;
    overflow: hidden;
    position: relative;
  }

  .qr-block {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qrImg {
    display: block;
    width: 112px;
    height: 112px;
  }

  .info-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
    min-width: 0;
  }

  .l-encode {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .l-name {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #222;
    line-height: 1.35;
    word-break: break-word;
  }

  .l-color {
    font-family: 'Courier New', monospace;
    font-size: 9.5px;
    color: #555;
    line-height: 1.3;
  }

  .l-bottom {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .l-meters {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #111;
  }

  .l-type {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    background: #eee;
    color: #444;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── print styles ── */
  @media print {
    body {
      background: white;
      padding: 0;
      display: block;
    }

    .screen-ui { display: none !important; }

    .label-container {
      display: block;
    }

    /* exact 76×38mm */
    .label {
      width: 76mm;
      height: 38mm;
      border: none;
      border-radius: 0;
      padding: 2mm 3mm;
      gap: 3mm;
      page-break-inside: avoid;
    }

    #qrImg {
      width: 32mm;
      height: 32mm;
    }

    .l-encode { font-size: 10pt; }
    .l-name   { font-size: 7.5pt; }
    .l-color  { font-size: 7pt; }
    .l-meters { font-size: 9pt; }
    .l-type   { font-size: 7pt; }

    @page {
      size: 76mm 38mm;
      margin: 0;
    }
  }
</style>
</head>
<body>

<!-- ── Screen UI (hidden on print) ── -->
<div class="screen-ui">
  <h1>Fabric Lump Label</h1>
  <p>TTP-244 PRO · 76 × 38 mm · Fill fields or open via AppSheet URL</p>

  <div class="fields">
    <input id="f_encode"  placeholder="Encode  e.g. C012" />
    <input id="f_meters"  placeholder="Meters  e.g. 42" />
    <input id="f_name"    class="full" placeholder="Item name  e.g. Santoon Polyster Yellow" />
    <input id="f_color"   placeholder="Color  e.g. ArtyClick Amber" />
    <input id="f_type"    placeholder="Type  e.g. Dyed" />
  </div>

  <div class="btn-row">
    <button class="btn" onclick="buildLabel()">Preview</button>
    <button class="btn primary" onclick="window.print()">Print label</button>
  </div>

  <div class="status" id="status"></div>
</div>

<!-- ── Label (printed) ── -->
<div class="label-container">
  <div class="label" id="label">
    <div class="qr-block">
      <img id="qrImg" src="" alt="QR" />
    </div>
    <div class="info-block">
      <div class="l-encode" id="l_encode"></div>
      <div class="l-name"   id="l_name"></div>
      <div class="l-color"  id="l_color"></div>
      <div class="l-bottom">
        <div class="l-meters" id="l_meters"></div>
        <div class="l-type"   id="l_type"></div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ── read URL params (sent by AppSheet) ── */
  function getParam(key, fallback) {
    const p = new URLSearchParams(window.location.search);
    return p.get(key) || fallback || '';
  }

  /* ── build label from current field values ── */
  function buildLabel() {
    const encode = document.getElementById('f_encode').value.trim();
    const name   = document.getElementById('f_name').value.trim();
    const color  = document.getElementById('f_color').value.trim();
    const meters = document.getElementById('f_meters').value.trim();
    const type   = document.getElementById('f_type').value.trim();

    if (!encode) {
      setStatus('Enter an encode code first.', 'err');
      return;
    }

    /* QR encodes the full label string — same format as your column names */
    const qrData = [encode, name, color, meters + '_Meter', type]
      .filter(Boolean).join('_');

    const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='
      + encodeURIComponent(qrData)
      + '&bgcolor=ffffff&color=000000&margin=1';

    document.getElementById('qrImg').src     = qrUrl;
    document.getElementById('l_encode').textContent = encode;
    document.getElementById('l_name').textContent   = name;
    document.getElementById('l_color').textContent  = color;
    document.getElementById('l_meters').textContent = meters ? meters + ' Meter' : '';
    document.getElementById('l_type').textContent   = type;

    setStatus('Label ready — tap Print label.', 'ok');
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent  = msg;
    el.className    = 'status ' + (cls || '');
  }

  /* ── auto-fill from URL params (AppSheet calls this page) ── */
  function loadFromUrl() {
    const encode = getParam('encode');
    const name   = getParam('name');
    const color  = getParam('color');
    const meters = getParam('meters');
    const type   = getParam('type');

    if (encode) {
      document.getElementById('f_encode').value = encode;
      document.getElementById('f_name').value   = name;
      document.getElementById('f_color').value  = color;
      document.getElementById('f_meters').value = meters;
      document.getElementById('f_type').value   = type;
      buildLabel();

      /* auto-print if ?autoprint=1 is in the URL */
      if (getParam('autoprint') === '1') {
        setTimeout(() => window.print(), 1200);
      }
    } else {
      /* show example label by default */
      document.getElementById('f_encode').value = 'C012';
      document.getElementById('f_name').value   = 'Santoon Polyster Yellow';
      document.getElementById('f_color').value  = 'ArtyClick Amber';
      document.getElementById('f_meters').value = '42';
      document.getElementById('f_type').value   = 'Dyed';
      buildLabel();
      setStatus('Example label — fill your values above.', '');
    }
  }

  loadFromUrl();

  /* enter key triggers preview */
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') buildLabel(); });
  });
</script>
</body>
</html>
